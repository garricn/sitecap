# Email + password auth flow for sitecap
# Usage: sitecap https://app.example.com --profile Default --auth-flow examples/email-password.yaml
#
# Set environment variables before running:
#   export LOGIN_EMAIL="user@example.com"
#   export LOGIN_PASSWORD="your-password"

name: email-password

steps:
  # Restore cookies from a previous login
  - cookies: restore
    optional: true

  - wait: settle

  # Fill in credentials (uses $VAR syntax for env vars)
  - fill:
      selector: "[name='email'], [type='email'], #email"
      value: "$LOGIN_EMAIL"

  - fill:
      selector: "[name='password'], [type='password'], #password"
      value: "$LOGIN_PASSWORD"

  # Submit the form
  - click: "button[type='submit'], button:has-text('Log in'), button:has-text('Sign in')"

  # Wait for redirect to authenticated page
  - wait: redirect

  # Save cookies for next run
  - cookies: save
